# Local dev services. Postgres is the audit store (docs/INTERPOSE_SCOPING.md Section
# 6.7). Redis (Section 6.8) joins in Phase 2 Day 6 for the HITL ticket queue -- session
# state (risk scores etc.) stays deferred until something actually reads/writes it.
# Containerizing the gateway + a mock upstream for a fuller docker-compose stack is
# still deferred to Phase 2 Day 9 (Helm), per the Day 5 note in docs/ROADMAP.md.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: interpose
      POSTGRES_PASSWORD: interpose_dev
      POSTGRES_DB: interpose
    ports:
      # Host-side 5433, not 5432: this machine already has an unrelated Postgres
      # install listening on 5432 -- left alone rather than touched.
      - "5433:5432"
    volumes:
      - interpose_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interpose -d interpose"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  interpose_postgres_data:
