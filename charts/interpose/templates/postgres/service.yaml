{{- if .Values.postgres.embedded }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "interpose.fullname" . }}-postgres
  labels:
    {{- include "interpose.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      name: postgres
  selector:
    {{- include "interpose.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
