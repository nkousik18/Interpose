# Section 11.5's `interpose-secrets` Secret -- DB credentials + LLM API key. In
# production this Secret is externally managed (external-secrets-operator syncing AWS
# Secrets Manager, per Section 11.5 -- "documented but not required for MVP") and
# referenced via secrets.existingSecretName; the chart never creates it. This template
# only exists for local dev convenience, gated by secrets.createDev (see values.yaml).
{{- if and .Values.secrets.createDev (not .Values.secrets.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "interpose.appSecretName" . }}
  labels:
    {{- include "interpose.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "interpose.databaseUrl" . | quote }}
  REDIS_URL: {{ include "interpose.redisUrl" . | quote }}
  {{- if .Values.llm.groqApiKey }}
  GROQ_API_KEY: {{ .Values.llm.groqApiKey | quote }}
  {{- end }}
{{- end }}
