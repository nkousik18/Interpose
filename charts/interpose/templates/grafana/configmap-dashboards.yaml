{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "interpose.fullname" . }}-grafana-dashboards
  labels:
    {{- include "interpose.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  {{- range $path, $_ := .Files.Glob "files/dashboards/*.json" }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
{{- end }}
