{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "interpose.fullname" . }}-grafana
  labels:
    {{- include "interpose.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      name: http
  selector:
    {{- include "interpose.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
{{- end }}
