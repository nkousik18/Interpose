{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "interpose.fullname" . }}-grafana
  labels:
    {{- include "interpose.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "interpose.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "interpose.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana-oss:11.4.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | quote }}
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: provisioning
              subPath: datasources.yaml
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
            - name: provisioning
              subPath: dashboards.yaml
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: provisioning
          configMap:
            name: {{ include "interpose.fullname" . }}-grafana-provisioning
        - name: dashboards
          configMap:
            name: {{ include "interpose.fullname" . }}-grafana-dashboards
{{- end }}
