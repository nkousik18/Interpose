{{- if .Values.redis.embedded }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "interpose.fullname" . }}-redis
  labels:
    {{- include "interpose.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      name: redis
  selector:
    {{- include "interpose.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
